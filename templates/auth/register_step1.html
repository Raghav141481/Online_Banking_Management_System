{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-2">Open an Account</h2>
                <p class="text-secondary">Step 1 of 4: Personal Information</p>
                <div class="progress  mb-4" style="height: 6px;">
                    <div class="progress-bar bg-primary" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>

            <form method="POST" action="{{ url_for('register_step1') }}">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label ms-1">First Name</label>
                        <input type="text" class="form-control rounded-pill px-4" name="first_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label ms-1">Last Name</label>
                        <input type="text" class="form-control rounded-pill px-4" name="last_name" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label ms-1">Date of Birth (Must be >= 18)</label>
                    <input type="date" class="form-control rounded-pill px-4" name="dob" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label ms-1">Email Address</label>
                    <input type="email" class="form-control rounded-pill px-4" name="email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label ms-1">Mobile Number (10 digits)</label>
                    <input type="tel" class="form-control rounded-pill px-4" name="mobile_no" required pattern="\d{10}" title="Must be exactly 10 digits">
                </div>

                <div class="mb-3">
                    <label class="form-label ms-1">Address</label>
                    <textarea class="form-control rounded-4 px-4 py-2" name="address" rows="2" required></textarea>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label ms-1">ID Proof Type</label>
                        <select class="form-select rounded-pill px-4" name="id_proof_type" required>
                            <option value="Aadhar">Aadhar</option>
                            <option value="PAN">PAN</option>
                            <option value="Driving License">Driving License</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label ms-1">ID Proof Number</label>
                        <input type="text" class="form-control rounded-pill px-4 font-monospace" name="id_proof_no" required>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label ms-1">Gender</label>
                        <select class="form-select rounded-pill px-4" name="gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label ms-1">Nationality</label>
                        <select class="form-select rounded-pill px-4" name="nationality" required>
                            <option value="Indian">Indian</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <!-- Security Question Section -->
                <div class="mb-3 pt-3 border-top border-secondary border-opacity-25">
                    <h5 class="mb-3" style="color:var(--accent-rose);"><i class="bi bi-shield-lock me-2"></i>Security Question</h5>
                    <label class="form-label ms-1">Choose a Security Question</label>
                    <select class="form-select rounded-pill px-4" name="security_question" id="security_question" required>
                        <option value="" disabled selected>Select a security question...</option>
                        <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                        <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                        <option value="What city were you born in?">What city were you born in?</option>
                        <option value="What is the name of your favourite teacher?">What is the name of your favourite teacher?</option>
                        <option value="What is your childhood nickname?">What is your childhood nickname?</option>
                        <option value="What is the name of your first school?">What is the name of your first school?</option>
                        <option value="What is your favourite movie?">What is your favourite movie?</option>
                        <option value="What street did you grow up on?">What street did you grow up on?</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label ms-1">Your Answer</label>
                    <input type="text" class="form-control rounded-pill px-4" name="security_answer" required placeholder="Type your answer here...">
                    <div class="form-text ms-2 mt-1 text-info"><small>This will be used to verify your identity if you forget your password.</small></div>
                </div>
                
                <div class="d-flex justify-content-between mt-4">
                    <a href="{{ url_for('login') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">Save & Continue &rarr;</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
