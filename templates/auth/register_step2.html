{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-2">Open an Account</h2>
                <p class="text-secondary">Step 2 of 4: Occupation Details</p>
                <div class="progress  mb-4" style="height: 6px;">
                    <div class="progress-bar bg-primary" role="progressbar" style="width: 50%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>

            <form method="POST" action="{{ url_for('register_step2') }}">
                <div class="mb-4">
                    <label class="form-label ms-1">Occupation Type</label>
                    <select class="form-select form-select-lg rounded-pill px-4" name="occupation_type" required>
                        <option value="" disabled selected>Select occupation...</option>
                        <option value="Salaried">Salaried</option>
                        <option value="Self-Employed">Self-Employed</option>
                        <option value="Business">Business</option>
                    </select>
                </div>

                <div class="mb-5">
                    <label class="form-label ms-1">Annual Income Range</label>
                    <select class="form-select form-select-lg rounded-pill px-4" name="annual_income" required>
                        <option value="" disabled selected>Select income bracket...</option>
                        <option value="Below 5 Lakhs">Below 5 Lakhs</option>
                        <option value="5 - 8 Lakhs">5 - 8 Lakhs</option>
                        <option value="8 - 12 Lakhs">8 - 12 Lakhs</option>
                        <option value="12 - 30 Lakhs">12 - 30 Lakhs</option>
                        <option value="30+ Lakhs">30+ Lakhs</option>
                    </select>
                </div>
                
                <div class="d-flex justify-content-between mt-4">
                    <a href="{{ url_for('register_step1') }}" class="btn btn-outline-secondary rounded-pill px-4">&larr; Back</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4">Save & Continue &rarr;</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
