{% extends 'base.html' %}

{% block content %}
<div class="row mb-4 align-items-center">
    <div class="col-auto">
        <div class="stat-icon emerald mb-0"><i class="bi bi-cash-stack"></i></div>
    </div>
    <div class="col">
        <h3 class="fw-bold mb-0">Transactions Management</h3>
        <p class="text-secondary mb-0">Perform deposits or withdrawals on behalf of customers</p>
    </div>
</div>

<div class="glass-card p-4 mx-auto mb-4" style="max-width: 600px;">
    <h5 class="mb-3">Transact</h5>
    <form action="{{ url_for('staff_manage_transaction') }}" method="POST">
        <div class="mb-3">
            <label class="form-label form-label-sm">Select Customer Account</label>
            <select name="account_id" class="form-select border-0 shadow-sm" required>
                <option value="" disabled selected>-- Choose Account --</option>
                {% for acc in accounts %}
                    <option value="{{ acc.id }}">{{ acc.account_number }} - {{ acc.username }} (Bal: ₹{{ "%.2f"|format(acc.balance) }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label form-label-sm">Action</label>
                <select name="action" class="form-select border-0 shadow-sm" required>
                    <option value="Deposit">Deposit</option>
                    <option value="Withdraw">Withdraw</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label form-label-sm">Amount</label>
                <div class="input-group">
                    <span class="input-group-text border-0 shadow-sm col-bg">₹</span>
                    <input type="number" step="0.01" min="1" name="amount" class="form-control border-0 shadow-sm" placeholder="0.00" required>
                </div>
            </div>
        </div>
        <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 mt-3">Confirm Transaction</button>
    </form>
</div>
{% endblock %}
