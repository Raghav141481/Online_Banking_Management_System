{% extends 'base.html' %}

{% block content %}
<div class="row align-items-center min-vh-50 mt-5">
    <div class="col-lg-12 text-center mb-5">
        <h1 class="display-3 fw-bold mb-4">Welcome, <span class="text-gradient">Bank Staff</span></h1>
        <p class="lead text-secondary mb-5">Access portals to manage day-to-day banking responsibilities.</p>
        
        <div class="d-flex justify-content-center gap-4 flex-wrap">
            <a href="{{ url_for('staff_requests') }}" class="btn btn-lg btn-outline-light px-5 py-4 rounded-4" style="width: 250px;">
                <span class="fs-1 d-block mb-2">📋</span>
                <span class="fs-5">Approval Requests</span>
            </a>
            <a href="{{ url_for('manage_accounts') }}" class="btn btn-lg btn-outline-light px-5 py-4 rounded-4" style="width: 250px;">
                <span class="fs-1 d-block mb-2">👥</span>
                <span class="fs-5">Manage Accounts</span>
            </a>
            <a href="{{ url_for('staff_transactions') }}" class="btn btn-lg btn-outline-light px-5 py-4 rounded-4" style="width: 250px;">
                <span class="fs-1 d-block mb-2">💰</span>
                <span class="fs-5">Transactions</span>
            </a>
            <a href="{{ url_for('staff_loans') }}" class="btn btn-lg btn-outline-light px-5 py-4 rounded-4" style="width: 250px;">
                <span class="fs-1 d-block mb-2">🏦</span>
                <span class="fs-5">Approve Loans</span>
            </a>
            <a href="{{ url_for('staff_tickets') }}" class="btn btn-lg btn-outline-light px-5 py-4 rounded-4" style="width: 250px;">
                <span class="fs-1 d-block mb-2">🎟️</span>
                <span class="fs-5">Support Tickets</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
