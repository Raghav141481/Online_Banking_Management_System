{% extends 'base.html' %}

{% block content %}
<div class="row align-items-center min-vh-50 mt-5">
    <div class="col-lg-12 text-center mb-5">
        <h1 class="display-3 fw-bold mb-4">Welcome, <span class="text-gradient">Global Admin</span></h1>
        <p class="lead text-secondary mb-5">Oversee complete system operations.</p>
        
        <div class="d-flex justify-content-center gap-4 flex-wrap">
            <a href="{{ url_for('admin_reports') }}" class="btn btn-lg btn-outline-light px-5 py-4 rounded-4" style="width: 250px;">
                <span class="fs-1 d-block mb-2">📊</span>
                <span class="fs-5">System Reports</span>
            </a>
            <a href="{{ url_for('admin_customers') }}" class="btn btn-lg btn-outline-light px-5 py-4 rounded-4" style="width: 250px;">
                <span class="fs-1 d-block mb-2">👥</span>
                <span class="fs-5">Manage Users</span>
            </a>
            <a href="{{ url_for('admin_staff') }}" class="btn btn-lg btn-outline-light px-5 py-4 rounded-4" style="width: 250px;">
                <span class="fs-1 d-block mb-2">🏷️</span>
                <span class="fs-5">Manage Staff</span>
            </a>
            <a href="{{ url_for('staff_loans') }}" class="btn btn-lg btn-outline-light px-5 py-4 rounded-4" style="width: 250px;">
                <span class="fs-1 d-block mb-2">🏦</span>
                <span class="fs-5">All Loans</span>
            </a>
            <a href="{{ url_for('staff_tickets') }}" class="btn btn-lg btn-outline-light px-5 py-4 rounded-4" style="width: 250px;">
                <span class="fs-1 d-block mb-2">🎟️</span>
                <span class="fs-5">All Tickets</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
